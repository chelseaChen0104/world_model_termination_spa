# RL Training Config for Sudoku Termination Prediction
# Uses LiveEnvTerminationRLTrainer with compute_termination_reward_v2

data:
  train_batch_size: 64
  micro_batch_size_per_gpu: 4
  max_length: 2048

model:
  partial_pretrain: outputs/sft_sudoku/checkpoint-best
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  enable_gradient_checkpointing: True
  trust_remote_code: True

algorithm:
  adv_estimator: grpo
  gamma: 1.0
  lam: 0.95
  use_kl_in_reward: True
  kl_penalty: 0.01
  norm_adv_by_std_in_grpo: True

reward:
  version: 2
  solvable_correct: 0.5
  solvable_wrong: -0.25
  bp_tp: 3.0
  bp_fn: -2.0
  bp_fp: -0.5
  format_tag_reward: 0.1

environment:
  type: sudoku
  grid_size: 9
  difficulty: easy
  max_steps: 30  # Sudoku becomes unsolvable quickly with random play

sampling:
  solvable_ratio: 0.5
  breaking_point_focus: 0.3
  trajectory_pool_size: 200
  refresh_frequency: 50

actor_rollout_ref:
  actor:
    optim:
      lr: 1e-6
      betas: [0.9, 0.95]
      weight_decay: 0.01
    ppo_mini_batch_size: 8
    ppo_epochs: 4
    clip_ratio: 0.2
    loss_agg_mode: mean
  rollout:
    n: 4
    temperature: 0.3
    max_new_tokens: 512
    rollout_filter_ratio: 0.0
    rollout_filter_type: none

trainer:
  default_local_dir: outputs/rl_sudoku
  default_hdfs_dir: null
  resume_path: null
  project_name: termination-prediction
  experiment_name: rl_sudoku_grpo_live
  total_training_steps: 1000
  test_freq: 50
  save_freq: 500
  val_before_train: True
  logger: ['console']
  seed: 42
  n_gpus_per_node: 1
  max_grad_norm: 1.0
