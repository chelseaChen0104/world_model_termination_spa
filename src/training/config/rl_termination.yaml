# RL Training Config for Termination Prediction Project
# This config uses GRPO for advantage estimation with termination-specific rewards
# Supports both static dataset (SimpleTerminationRLTrainer) and
# live environment (LiveEnvTerminationRLTrainer) modes.

data:
  train_batch_size: 64
  micro_batch_size_per_gpu: 4
  train_files: data/termination_study_v2/wm_train.parquet
  val_files: data/termination_study_v2/wm_val.parquet
  max_length: 2048

model:
  # Start from SFT checkpoint
  partial_pretrain: outputs/sft_termination/checkpoint-best  # SFT model path
  base_model: Qwen/Qwen2.5-0.5B-Instruct  # Base model for tokenizer
  fsdp_config:
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  enable_gradient_checkpointing: True
  trust_remote_code: True
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear

algorithm:
  # GRPO for outcome-based advantage (good for sparse rewards like termination)
  adv_estimator: grpo
  gamma: 1.0  # No discounting for episode-level rewards
  lam: 0.95
  use_kl_in_reward: True
  kl_penalty: 0.01  # KL penalty to prevent policy divergence
  norm_adv_by_std_in_grpo: True

# Reward v2 configuration — asymmetric, no steps_left
reward:
  version: 2  # Use compute_termination_reward_v2
  # Solvability prediction
  solvable_correct: 0.5
  solvable_wrong: -0.25
  # Breaking point detection (strongly asymmetric)
  bp_tp: 3.0            # Correctly caught deadlock — big reward
  bp_fn: -2.0           # Missed deadlock — big penalty
  bp_fp: -0.5           # False alarm — moderate penalty
  # Format compliance
  format_tag_reward: 0.1  # +0.1 per XML tag present (max +0.5 for 5 tags)
  # Legacy v1 weights (for SimpleTerminationRLTrainer backward compat)
  done_reward_weight: 1.0
  steps_reward_weight: 0.5
  solvable_reward_weight: 0.5
  deadlock_reward_weight: 0.3
  breaking_point_bonus: 1.0

# Live environment configuration (for LiveEnvTerminationRLTrainer)
environment:
  type: sokoban
  dim_room: [6, 6]
  num_boxes: 1
  max_steps: 100

# Balanced sampling configuration (for LiveEnvTerminationRLTrainer)
sampling:
  solvable_ratio: 0.5
  breaking_point_focus: 0.3
  window_around_bp: 3
  trajectory_pool_size: 200
  refresh_frequency: 50

actor_rollout_ref:
  actor:
    optim:
      lr: 1e-6
      betas: [0.9, 0.95]
      weight_decay: 0.01
    ppo_mini_batch_size: 8
    ppo_epochs: 4
    clip_ratio: 0.2
    loss_agg_mode: mean
  rollout:
    n: 4  # Number of rollouts per prompt for variance reduction
    temperature: 0.3  # Lower temperature for more consistent XML format
    max_new_tokens: 512
    rollout_filter_ratio: 0.0  # No filtering
    rollout_filter_type: none

trainer:
  default_local_dir: outputs/rl_termination
  default_hdfs_dir: null
  resume_path: null
  project_name: termination-prediction
  experiment_name: rl_grpo_live
  total_training_steps: 1000
  test_freq: 50
  save_freq: 500
  val_before_train: True
  logger: ['console']
  seed: 42
  n_gpus_per_node: 1
  balance_batch: False
  validation_steps: 10
  max_grad_norm: 1.0
  generations_to_log_to_wandb:
    train: 5
    val: 10
